<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카테고리 관리</title>
    <style>
        body { font-family: 'Malgun Gothic', Arial, sans-serif; max-width: 1100px; margin: 40px auto; padding: 0 20px; color: #333; }
        h1 { border-bottom: 2px solid #4a90d9; padding-bottom: 10px; color: #2c3e50; }
        .btn { display: inline-block; padding: 8px 16px; background: #4a90d9; color: white !important; text-decoration: none; border-radius: 4px; margin-bottom: 16px; }
        .btn:hover { background: #357abd; color: white !important;}
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #4a90d9; color: white; padding: 12px; text-align: left; }
        td { padding: 10px 12px; border-bottom: 1px solid #ddd; vertical-align: middle; }
        tr:hover { background: #f5f8ff; }

        /* 메시지 스타일 */
        .alert-success { background: #d4edda; border: 1px solid #c3e6cb; color: #155724; padding: 12px 16px; border-radius: 4px; margin-bottom: 16px; }
        .alert-danger { background: #f8d7da; border: 1px solid #f5c6cb; color: #721c24; padding: 12px 16px; border-radius: 4px; margin-bottom: 16px; }
        .empty-msg { text-align: center; padding: 40px; color: #999; font-size: 1.1em; }

        /* 삭제 버튼 스타일 */
        .btn-delete { background: none; border: none; color: #e74c3c; cursor: pointer; font-size: 0.95em; padding: 0; text-decoration: underline; }
        .btn-delete:hover { color: #c0392b; }

        .nav-links { margin-bottom: 15px; }
        .nav-links a { margin-right: 15px; color: #4a90d9; text-decoration: none; font-size: 0.9em; }
    </style>
</head>
<body>

<h1>카테고리 관리</h1>

<div class="alert-success" th:if="${successMessage}">
    <span th:text="${successMessage}">성공 메시지</span>
</div>

<div class="alert-danger" th:if="${errorMessage}">
    <span th:text="${errorMessage}">오류 메시지</span>
</div>

<div class="nav-links">
    <a class="btn" th:href="@{/categories/create}">+ 새 카테고리 등록</a>
    <a th:href="@{/products}">[상품 목록으로 이동]</a>
</div>

<div class="empty-msg" th:if="${#lists.isEmpty(categories)}">
    등록된 카테고리가 없습니다. 새 카테고리를 등록해 주세요.
</div>

<table th:unless="${#lists.isEmpty(categories)}">
    <thead>
    <tr>
        <th>ID</th>
        <th>카테고리 이름</th>
        <th>작업</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="cat : ${categories}">
        <td th:text="${cat.id}">1</td>
        <td th:text="${cat.name}">카테고리명</td>
        <td>
            <form th:action="@{/categories/{id}/delete(id=${cat.id})}"
                  method="post"
                  onsubmit="return confirm('정말 삭제하시겠습니까? 연결된 상품이 있으면 삭제되지 않습니다.');">
                <button type="submit" class="btn-delete">삭제</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>

<hr>
<footer style="text-align: center; color: #666; padding: 20px;">
    <p th:text="${'실습 수행: ' + #dates.format(#dates.createNow(), 'yyyy-MM-dd HH:mm:ss') + ' | 학번: 2371488 | 성명: 송지원'}"></p>
</footer>

</body>
</html>
